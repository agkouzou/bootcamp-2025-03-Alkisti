# Application
spring.application.name=bootcamp-2025-03
server.port=8080

# Logging
logging.level.root=INFO
logging.level.dev.ctrlspace.bootcamp_2025_03=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.springframework.security.oauth2.jwt=INFO

# Datasource
# JDBC URL format: jdbc:postgresql://<host>:<port>/<database>
spring.datasource.url=jdbc:postgresql://localhost:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=postgres
# (Optional but explicit) driver class
spring.datasource.driver-class-name=org.postgresql.Driver
#spring.datasource.hikari.maximum-pool-size=90
spring.datasource.hikari.housekeeping-period-ms=300000

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=true
spring.jpa.show-sql=true
spring.sql.init.mode=always

# Management / Actuator
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=when-authorized

# Groq API
groq.model=llama-3.3-70b-versatile
groq.api.url=https://api.groq.com/openai/v1/chat/completions

# CORS
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# Frontend
app.frontend.base-url=http://localhost:3000
